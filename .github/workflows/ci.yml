name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Compile and install artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21', '25', '26']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Verify unit tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for pattern in ("**/target/surefire-reports/TEST-*.xml", "**/target/failsafe-reports/TEST-*.xml"):
              for path in glob.glob(pattern, recursive=True):
                  total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No tests were recorded in surefire/failsafe reports")
          print(f"Recorded {total} tests")
          PY

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk-${{ matrix.java-version }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  maven-plugin-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: invoker
            step: Run invoker fixture tests
            cmd: mvn -B -ntp -Prun-its verify -pl test-order-maven-plugin -Dspotless.check.skip=true
            report_glob: test-order-maven-plugin/target/it/**
            java-version: '17'
          - name: fixture-its
            step: Run fixture integration tests
            cmd: mvn -B -ntp test -pl test-order-junit -Dtest="**/*IT" -DfailIfNoTests=false -Dspotless.check.skip=true
            report_glob: test-order-junit/target/surefire-reports/**
            java-version: '17'
          - name: plugin-its
            step: Run plugin integration tests
            cmd: >
              mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin
              -Dit.test="MavenPluginIT,EndToEndJUnit5IT,EndToEndJUnit6IT,ExportJsonMojoIT,TieredWorkflowIT"
              -Dspotless.check.skip=true
            report_glob: test-order-maven-plugin/target/failsafe-reports/**
            java-version: '17'
          - name: plugin-its-java25
            step: Run plugin integration tests on Java 25
            cmd: >
              mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin
              -Dit.test="MavenPluginIT,EndToEndJUnit5IT,EndToEndJUnit6IT,ExportJsonMojoIT,TieredWorkflowIT"
              -Dspotless.check.skip=true
            report_glob: test-order-maven-plugin/target/failsafe-reports/**
            java-version: '25'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

      - name: ${{ matrix.step }}
        run: ${{ matrix.cmd }}

      - name: Verify plugin integration tests ran
        if: matrix.name == 'plugin-its'
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for path in glob.glob("test-order-maven-plugin/target/failsafe-reports/TEST-*.xml"):
              total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No plugin integration tests were recorded")
          print(f"Recorded {total} plugin integration tests")
          PY

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-it-reports-${{ matrix.name }}
          path: ${{ matrix.report_glob }}

  gradle-plugin-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        # Gradle 8.14.3 (current wrapper) cannot run on Java 25 — its bundled
        # Groovy 3 fails with "Unsupported class file major version 69" while
        # parsing build scripts. Java 25 plugin compatibility is covered by
        # the Maven plugin's plugin-its-java25 matrix entry.
        java-version: ['21']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install artifacts for Gradle plugin tests
        run: mvn -B -ntp -pl test-order-core,test-order-junit,test-order-agent,test-order-ci,test-order-dashboard -am install -DskipTests -Dspotless.check.skip=true

      - name: Publish Gradle plugin to mavenLocal
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Run Gradle plugin tests
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon test

      - name: Verify Gradle plugin tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for path in glob.glob("test-order-gradle-plugin/build/test-results/test/TEST-*.xml"):
              total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No Gradle plugin tests were recorded")
          print(f"Recorded {total} Gradle plugin tests")
          PY

      - name: Upload Gradle plugin reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-plugin-test-reports-jdk-${{ matrix.java-version }}
          path: |
            test-order-gradle-plugin/build/reports/**
            test-order-gradle-plugin/build/test-results/**

  maven-version-compat:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20
    strategy:
      fail-fast: false
      matrix:
        maven-version: ['3.8.8', '3.9.16']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Install Maven ${{ matrix.maven-version }}
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: ${{ matrix.maven-version }}

      - name: Verify Maven version
        run: mvn --version

      - name: Compile and install artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Run plugin integration tests
        run: |
          mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin \
            -Dit.test="MavenPluginIT,EndToEndJUnit5IT,EndToEndJUnit6IT" \
            -Dspotless.check.skip=true

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: maven-compat-reports-${{ matrix.maven-version }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  deploy-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [unit-tests, maven-plugin-integration-tests, gradle-plugin-tests, maven-version-compat]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN

      - name: Deploy SNAPSHOT
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: mvn -B -ntp deploy -DskipTests

      - name: Write job summary
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## SNAPSHOT deployed: \`${VERSION}\`

          ### Quick Start (Maven)

          \`\`\`xml
          <repositories>
            <repository>
              <id>ossrh-snapshots</id>
              <url>https://central.sonatype.com/repository/maven-snapshots/</url>
              <snapshots><enabled>true</enabled></snapshots>
            </repository>
          </repositories>

          <build>
            <plugins>
              <plugin>
                <groupId>me.bechberger</groupId>
                <artifactId>test-order-maven-plugin</artifactId>
                <version>${VERSION}</version>
                <executions><execution><goals><goal>prepare</goal></goals></execution></executions>
              </plugin>
            </plugins>
          </build>
          \`\`\`

          ### Quick Start (Gradle)

          \`\`\`groovy
          // settings.gradle
          pluginManagement {
              repositories {
                  maven { url 'https://central.sonatype.com/repository/maven-snapshots/' }
                  gradlePluginPortal()
              }
          }

          // build.gradle
          plugins {
              id 'me.bechberger.test-order' version '${VERSION}'
          }
          \`\`\`

          ### Documentation

          - [Getting Started](https://github.com/parttimenerd/test-order/blob/main/docs/GETTING_STARTED.md)
          - [Maven Plugin Reference](https://github.com/parttimenerd/test-order/blob/main/docs/MAVEN_PLUGIN.md)
          - [CLI Reference](https://github.com/parttimenerd/test-order/blob/main/docs/CLI_REFERENCE.md)
          - [CI Setup](https://github.com/parttimenerd/test-order/blob/main/docs/ci-examples/)
          - [Full Documentation](https://github.com/parttimenerd/test-order/blob/main/docs/README.md)
          EOF

      - name: Trigger sample project rebuild
        if: env.GH_TOKEN != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SAMPLE_REPO_TOKEN }}
        run: |
          gh api repos/parttimenerd/sample-ci-test-order/dispatches \
            -f event_type=plugin-updated \
            -f "client_payload[version]=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" \
            -f "client_payload[sha]=${{ github.sha }}"

  od-detect:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

      - name: Detect order-dependent tests
        run: bash scripts/ci-detect-od-tests.sh --time-budget 120 --annotate-github
        continue-on-error: true

      - name: Write detection summary
        if: always()
        run: |
          echo "## Order-dependent test detection completed" >> "$GITHUB_STEP_SUMMARY"
          echo "See job logs for OD test findings and GitHub annotations." >> "$GITHUB_STEP_SUMMARY"

  snapshot-smoke:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy-snapshot
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Get deployed SNAPSHOT version
        id: version
        run: echo "VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)" >> "$GITHUB_OUTPUT"

      - name: Write Sonatype snapshot settings
        run: |
          mkdir -p ~/.m2
          cat > ~/.m2/ossrh-smoke-settings.xml <<'EOF'
          <settings>
            <profiles><profile><id>ossrh-snapshots</id>
              <repositories><repository>
                <id>ossrh-snapshots</id>
                <url>https://central.sonatype.com/repository/maven-snapshots/</url>
                <snapshots><enabled>true</enabled></snapshots>
                <releases><enabled>false</enabled></releases>
              </repository></repositories>
              <pluginRepositories><pluginRepository>
                <id>ossrh-snapshots</id>
                <url>https://central.sonatype.com/repository/maven-snapshots/</url>
                <snapshots><enabled>true</enabled></snapshots>
                <releases><enabled>false</enabled></releases>
              </pluginRepository></pluginRepositories>
            </profile></profiles>
            <activeProfiles><activeProfile>ossrh-snapshots</activeProfile></activeProfiles>
          </settings>
          EOF

      - name: Verify artifact resolves from Sonatype
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          echo "Verifying test-order-maven-plugin:${VERSION} is resolvable from Sonatype snapshots..."
          mvn -B -ntp -s ~/.m2/ossrh-smoke-settings.xml \
            dependency:get \
            -Dartifact="me.bechberger:test-order-maven-plugin:${VERSION}:jar" \
            -Dtransitive=false
          echo "✓ test-order-maven-plugin:${VERSION} resolved from Sonatype"

          mvn -B -ntp -s ~/.m2/ossrh-smoke-settings.xml \
            dependency:get \
            -Dartifact="me.bechberger:test-order-junit:${VERSION}:jar" \
            -Dtransitive=false
          echo "✓ test-order-junit:${VERSION} resolved from Sonatype"

      - name: Smoke-test SNAPSHOT against sample-basic
        working-directory: samples/sample-basic
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          # Inject snapshot repo and override version so sample uses the just-published artifact
          mvn -B -ntp -s ~/.m2/ossrh-smoke-settings.xml \
            -Dtest-order.version="${VERSION}" \
            test
          echo "✓ sample-basic tests passed with SNAPSHOT ${VERSION} from Sonatype"

      - name: Write job summary
        if: always()
        run: |
          VERSION="${{ steps.version.outputs.VERSION }}"
          STATUS="${{ job.status }}"
          cat >> "$GITHUB_STEP_SUMMARY" <<EOF
          ## Snapshot smoke test: \`${STATUS}\`

          Artifact: \`me.bechberger:test-order-maven-plugin:${VERSION}\`
          Repository: https://central.sonatype.com/repository/maven-snapshots/

          To use this snapshot in your project:

          \`\`\`xml
          <pluginRepositories>
            <pluginRepository>
              <id>ossrh-snapshots</id>
              <url>https://central.sonatype.com/repository/maven-snapshots/</url>
              <snapshots><enabled>true</enabled></snapshots>
            </pluginRepository>
          </pluginRepositories>
          \`\`\`
          EOF

