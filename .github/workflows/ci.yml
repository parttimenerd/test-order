name: CI

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Compile and install artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

  unit-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Verify unit tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for pattern in ("**/target/surefire-reports/TEST-*.xml", "**/target/failsafe-reports/TEST-*.xml"):
              for path in glob.glob(pattern, recursive=True):
                  total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No tests were recorded in surefire/failsafe reports")
          print(f"Recorded {total} tests")
          PY

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: surefire-reports-jdk-17
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  plugin-dogfood:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

      - name: Learn — build dependency index
        working-directory: samples/sample-basic
        run: mvn -B -ntp test -Dtestorder.mode=learn -Dmaven.test.failure.ignore=true

      - name: Auto — run tests in scored order
        working-directory: samples/sample-basic
        run: mvn -B -ntp test -Dmaven.test.failure.ignore=true

      - name: Show — print ranked test list
        working-directory: samples/sample-basic
        run: mvn -B -ntp test-order:show

  maven-plugin-integration-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: invoker
            step: Run invoker fixture tests
            cmd: mvn -B -ntp -Prun-its verify -pl test-order-maven-plugin -Dspotless.check.skip=true
            report_glob: test-order-maven-plugin/target/it/**
            java-version: '17'
          - name: fixture-its
            step: Run fixture integration tests
            cmd: >-
              mvn -B -ntp test -pl test-order-junit
              -Dtest="ParameterizedTestOrderingIT,ChangeDetectionEdgeCasesIT,ParallelExecutionIT,JaCoCoCoexistenceIT"
              -DfailIfNoTests=false -Dspotless.check.skip=true
            report_glob: test-order-junit/target/surefire-reports/**
            java-version: '17'
          - name: plugin-its
            step: Run plugin integration tests
            cmd: >-
              mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin
              -Dit.test="MavenPluginIT,EndToEndJUnit5IT,EndToEndJUnit6IT,ExportJsonMojoIT,TieredWorkflowIT,SkipInactiveModulesIT,MultiModuleWorkflowIT"
              -Dspotless.check.skip=true
            report_glob: test-order-maven-plugin/target/failsafe-reports/**
            java-version: '17'
          - name: flaky-cache-sample
            step: Smoke-test flaky/quarantine/cache features on samples/sample-flaky-cache
            cmd: bash scripts/test_flaky_cache_sample.sh
            report_glob: samples/sample-flaky-cache/target/surefire-reports/**
            java-version: '21'

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

      - name: ${{ matrix.step }}
        run: ${{ matrix.cmd }}

      - name: Verify plugin integration tests ran
        if: matrix.name == 'plugin-its'
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for path in glob.glob("test-order-maven-plugin/target/failsafe-reports/TEST-*.xml"):
              total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No plugin integration tests were recorded")
          print(f"Recorded {total} plugin integration tests")
          PY

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: plugin-it-reports-${{ matrix.name }}
          path: ${{ matrix.report_glob }}

  gradle-plugin-tests:
    runs-on: ubuntu-latest
    needs: build
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '21'
          cache: maven

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v6

      - name: Install artifacts for Gradle plugin tests
        run: mvn -B -ntp -pl test-order-core,test-order-junit,test-order-agent,test-order-ci,test-order-dashboard -am install -DskipTests -Dspotless.check.skip=true

      - name: Publish Gradle plugin to mavenLocal
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Run Gradle plugin tests
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon test

      - name: Verify Gradle plugin tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for path in glob.glob("test-order-gradle-plugin/build/test-results/test/TEST-*.xml"):
              total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No Gradle plugin tests were recorded")
          print(f"Recorded {total} Gradle plugin tests")
          PY

      - name: Upload Gradle plugin reports on failure
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: gradle-plugin-test-reports-jdk-21
          path: |
            test-order-gradle-plugin/build/reports/**
            test-order-gradle-plugin/build/test-results/**
