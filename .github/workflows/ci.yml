name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: sapmachine
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build and run unit tests
        run: mvn -B -ntp test

      - name: Verify unit tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for pattern in ("**/target/surefire-reports/TEST-*.xml", "**/target/failsafe-reports/TEST-*.xml"):
              for path in glob.glob(pattern, recursive=True):
                  total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No tests were recorded in surefire/failsafe reports")
          print(f"Recorded {total} tests")
          PY

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports-jdk-${{ matrix.java-version }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  maven-plugin-integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests install

      - name: Run plugin integration tests
        run: mvn -B -ntp -Prun-its verify -pl test-order-maven-plugin

      - name: Verify plugin integration tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for path in glob.glob("test-order-maven-plugin/target/failsafe-reports/TEST-*.xml"):
              total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No plugin integration tests were recorded")
          print(f"Recorded {total} plugin integration tests")
          PY

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-it-reports
          path: |
            test-order-maven-plugin/target/failsafe-reports/**
            test-order-maven-plugin/target/surefire-reports/**
            test-order-maven-plugin/target/it/**

  gradle-plugin-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: sapmachine
          java-version: '21'
          cache: maven

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install core artifact for Gradle plugin tests
        run: mvn -B -ntp -pl test-order-core -am install -DskipTests

      - name: Run Gradle plugin tests
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon test

      - name: Verify Gradle plugin tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for path in glob.glob("test-order-gradle-plugin/build/test-results/test/TEST-*.xml"):
              total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No Gradle plugin tests were recorded")
          print(f"Recorded {total} Gradle plugin tests")
          PY

      - name: Upload Gradle plugin reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: gradle-plugin-test-reports
          path: |
            test-order-gradle-plugin/build/reports/**
            test-order-gradle-plugin/build/test-results/**

  end-to-end-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests install

      - name: Run end-to-end integration tests
        run: mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin

      - name: Verify end-to-end tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for pattern in (
              "test-order-maven-plugin/target/failsafe-reports/TEST-*.xml",
              "test-order-maven-plugin/target/surefire-reports/TEST-*.xml",
          ):
              for path in glob.glob(pattern):
                  total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No end-to-end tests were recorded")
          print(f"Recorded {total} end-to-end tests")
          PY

      - name: Upload E2E test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            test-order-maven-plugin/target/failsafe-reports/**
            test-order-maven-plugin/target/surefire-reports/**
