name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Build and run unit tests
        run: mvn -B -ntp test

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: surefire-reports
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  maven-plugin-integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests install

      - name: Run plugin integration tests
        run: mvn -B -ntp -Prun-its verify -pl test-order-maven-plugin

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: plugin-it-reports
          path: |
            test-order-maven-plugin/target/failsafe-reports/**
            test-order-maven-plugin/target/surefire-reports/**
            test-order-maven-plugin/target/it/**

  end-to-end-tests:
    runs-on: ubuntu-latest
    needs: build-and-test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests install

      - name: Run end-to-end integration tests
        run: mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin

      - name: Upload E2E test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-reports
          path: |
            test-order-maven-plugin/target/failsafe-reports/**
            test-order-maven-plugin/target/surefire-reports/**
