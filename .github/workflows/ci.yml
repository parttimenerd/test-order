name: CI

on:
  push:
    branches:
      - main
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build and run unit tests
        run: mvn -B -ntp test

      - name: Verify unit tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for pattern in ("**/target/surefire-reports/TEST-*.xml", "**/target/failsafe-reports/TEST-*.xml"):
              for path in glob.glob(pattern, recursive=True):
                  total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No tests were recorded in surefire/failsafe reports")
          print(f"Recorded {total} tests")
          PY

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: surefire-reports-jdk-${{ matrix.java-version }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  maven-plugin-integration-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests install

      - name: Run fixture integration tests
        run: mvn -B -ntp test -pl test-order-junit -Dtest="**/*IT" -DfailIfNoTests=false

      - name: Run plugin integration tests
        run: mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin

      - name: Run invoker fixture tests
        run: mvn -B -ntp -Prun-its verify -pl test-order-maven-plugin

      - name: Verify plugin integration tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for path in glob.glob("test-order-maven-plugin/target/failsafe-reports/TEST-*.xml"):
              total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No plugin integration tests were recorded")
          print(f"Recorded {total} plugin integration tests")
          PY

      - name: Upload integration test reports on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: plugin-it-reports
          path: |
            test-order-maven-plugin/target/failsafe-reports/**
            test-order-maven-plugin/target/surefire-reports/**
            test-order-maven-plugin/target/it/**

  gradle-plugin-tests:
    runs-on: ubuntu-latest
    needs: build-and-test
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '21'
          cache: maven

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install artifacts for Gradle plugin tests
        run: mvn -B -ntp -pl test-order-core,test-order-ci,test-order-dashboard -am install -DskipTests

      - name: Publish Gradle plugin to mavenLocal
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Run Gradle plugin tests
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon test

      - name: Verify Gradle plugin tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for path in glob.glob("test-order-gradle-plugin/build/test-results/test/TEST-*.xml"):
              total += int(ET.parse(path).getroot().attrib.get("tests", "0"))
          if total <= 0:
              sys.exit("No Gradle plugin tests were recorded")
          print(f"Recorded {total} Gradle plugin tests")
          PY

      - name: Upload Gradle plugin reports on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: gradle-plugin-test-reports
          path: |
            test-order-gradle-plugin/build/reports/**
            test-order-gradle-plugin/build/test-results/**

  deploy-snapshot:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: [build-and-test, maven-plugin-integration-tests, gradle-plugin-tests]
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN

      - name: Deploy SNAPSHOT
        env:
          OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
          OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
        run: mvn -B -ntp deploy -DskipTests


