name: Nightly Order-Shuffle

on:
  workflow_dispatch:

concurrency:
  group: nightly-shuffle-${{ github.ref }}
  cancel-in-progress: true

jobs:
  order-shuffle:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Install project artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

      - name: Run order-dependent bug finder
        run: bash scripts/find_order_dependent_bugs.sh

      - name: Upload shuffle results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: order-shuffle-results-${{ github.run_number }}
          path: target/order-dependent-results/
          retention-days: 14
