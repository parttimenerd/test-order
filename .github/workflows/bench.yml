name: Performance Bench

on:
  schedule:
    - cron: '23 5 1 * *'   # monthly, 1st of the month, 05:23 UTC
  workflow_dispatch:

concurrency:
  group: bench-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Set up benchmark repositories
        run: bash scripts/setup-bench-repos.sh

      - name: Build and install test-order plugin
        run: mvn -B -ntp -DskipTests install

      - name: Build cloud-sdk-java (skip tests)
        run: mvn -B -ntp -DskipTests -DskipFormatting install
        working-directory: third-party/cloud-sdk-java

      - name: Run benchmark (--quick)
        run: bash scripts/bench_learn_modes_multiproject.sh --quick 2>&1 | tee bench-output.txt

      - name: Upload benchmark results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: bench-results-${{ github.run_number }}
          path: |
            bench-output.txt
            target/bench-*.csv
          retention-days: 90
