name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  full-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21', '25', '27']

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Install artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

      - name: Unit tests
        run: mvn -B -ntp test

      - name: Plugin integration tests
        run: >
          mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin
          -Dspotless.check.skip=true

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-test-reports-jdk-${{ matrix.java-version }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  full-tests-gradle:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 21
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '21'
          cache: maven

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Maven artifacts
        run: mvn -B -ntp -pl test-order-core,test-order-junit,test-order-agent,test-order-ci,test-order-dashboard -am install -DskipTests -Dspotless.check.skip=true

      - name: Publish Gradle plugin to mavenLocal
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon publishToMavenLocal

      - name: Run Gradle plugin tests
        working-directory: test-order-gradle-plugin
        run: ./gradlew --no-daemon test

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-gradle-reports
          path: |
            test-order-gradle-plugin/build/reports/**
            test-order-gradle-plugin/build/test-results/**

  maven-version-compat:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    strategy:
      fail-fast: false
      matrix:
        maven-version: ['3.8.8', '3.9.16']

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven

      - name: Install Maven ${{ matrix.maven-version }}
        uses: stCarolas/setup-maven@v5
        with:
          maven-version: ${{ matrix.maven-version }}

      - name: Compile and install artifacts
        run: mvn -B -ntp -DskipTests -Dspotless.check.skip=true install

      - name: Run unit tests
        run: mvn -B -ntp test

      - name: Run plugin integration tests
        run: |
          mvn -B -ntp verify -Dtestorder.it=true -pl test-order-maven-plugin \
            -Dit.test="MavenPluginIT,EndToEndJUnit5IT,EndToEndJUnit6IT" \
            -Dspotless.check.skip=true

      - name: Upload reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: release-maven-compat-${{ matrix.maven-version }}
          path: |
            **/target/surefire-reports/**
            **/target/failsafe-reports/**

  publish:
    runs-on: ubuntu-latest
    needs: [full-tests, full-tests-gradle, maven-version-compat]
    timeout-minutes: 30

    permissions:
      contents: write

    env:
      OSSRH_USERNAME: ${{ secrets.OSSRH_USERNAME }}
      OSSRH_TOKEN: ${{ secrets.OSSRH_TOKEN }}
      GPG_PASSPHRASE: ${{ secrets.GPG_PASSPHRASE }}

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          distribution: sapmachine
          java-version: '17'
          cache: maven
          server-id: ossrh
          server-username: OSSRH_USERNAME
          server-password: OSSRH_TOKEN
          gpg-private-key: ${{ secrets.GPG_PRIVATE_KEY }}
          gpg-passphrase: GPG_PASSPHRASE

      - name: Run release deploy
        run: |
          # Safety: refuse to publish SNAPSHOT versions
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          if echo "$VERSION" | grep -q SNAPSHOT; then
            echo "ERROR: Cannot publish SNAPSHOT version ($VERSION). Tag a release first."
            exit 1
          fi
          mvn -B -ntp -Prelease deploy -DskipTests

      - name: Create GitHub release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true

      - name: Trigger sample project version update
        if: env.GH_TOKEN != ''
        continue-on-error: true
        env:
          GH_TOKEN: ${{ secrets.SAMPLE_REPO_TOKEN }}
        run: |
          VERSION=$(mvn help:evaluate -Dexpression=project.version -q -DforceStdout)
          gh api repos/parttimenerd/sample-ci-test-order/dispatches \
            -f event_type=plugin-released \
            -f "client_payload[version]=$VERSION" \
            -f "client_payload[tag]=${{ github.ref_name }}"
