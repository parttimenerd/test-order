# GitHub Actions Workflow: Integration Tests
#
# This workflow runs the integration tests for the test-order project.
# It ensures that test fixtures are built properly and that all integration tests
# (marked with *IT pattern) pass across multiple JDK versions.
#
# Workflow triggers:
#   - On push to any branch
#   - On pull requests
#
# Test Coverage:
#   - Test Fixtures: Builds and validates test fixtures (fixture-jacoco, fixture-parameterized-tests, etc.)
#   - Integration Tests: Runs integration tests in test-order-junit using Maven Failsafe plugin
#   - JDK Versions: Tests against Java 17 and Java 21 to ensure compatibility
#
# Artifacts:
#   - Stores test results (surefire and failsafe reports) for analysis
#   - Stores coverage data if generated
#   - Available for download from the workflow run details

name: Integration Tests

on:
  push:
    branches:
      - main
      - develop
  pull_request:

concurrency:
  group: integration-tests-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  integration-tests:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        java-version: ['17', '21']

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK ${{ matrix.java-version }}
        uses: actions/setup-java@v4
        with:
          distribution: sapmachine
          java-version: ${{ matrix.java-version }}
          cache: maven

      - name: Build test fixtures
        run: |
          cd test-fixtures
          mvn -B -ntp clean test

      - name: Run integration tests
        run: |
          cd test-order-junit
          mvn -B -ntp test -Dtest=*IT

      - name: Run Kotlin & Kotest specific tests
        run: |
          echo "=== Testing Kotlin & Kotest Support ==="
          
          # Test Kotest fixture
          echo "Running Kotest integration tests..."
          cd test-order-junit
          mvn -B -ntp test -Dtest=KotestFrameworkIT
          
          # Test Kotlin source detection
          echo "Running Kotlin source detection tests..."
          cd ../test-order-agent
          mvn -B -ntp test -Dtest=KotlinSourceDetectionTest
          
          echo "=== Kotlin & Kotest tests completed successfully ==="

      - name: Verify integration tests ran
        run: |
          python - <<'PY'
          import glob
          import sys
          import xml.etree.ElementTree as ET

          total = 0
          for pattern in ("**/target/surefire-reports/TEST-*.xml", "**/target/failsafe-reports/TEST-*.xml"):
              for path in glob.glob(pattern, recursive=True):
                  try:
                      root = ET.parse(path).getroot()
                      tests_count = int(root.attrib.get("tests", "0"))
                      total += tests_count
                      print(f"Found {tests_count} tests in {path}")
                  except Exception as e:
                      print(f"Warning: Could not parse {path}: {e}")
          
          if total <= 0:
              sys.exit("No integration tests were recorded in test reports")
          print(f"\nTotal integration tests recorded: {total}")
          PY

      - name: Upload test reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: integration-test-reports-jdk-${{ matrix.java-version }}
          path: |
            test-fixtures/target/surefire-reports/**
            test-fixtures/target/failsafe-reports/**
            test-order-junit/target/surefire-reports/**
            test-order-junit/target/failsafe-reports/**
          retention-days: 30

      - name: Upload coverage data if available
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-reports-jdk-${{ matrix.java-version }}
          path: |
            **/target/site/jacoco/**
            **/target/*.exec
          retention-days: 30
          if-no-files-found: ignore
