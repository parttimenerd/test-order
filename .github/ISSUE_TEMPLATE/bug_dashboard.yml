name: "Bug: Dashboard issue"
description: The test-order dashboard is empty, shows wrong data, or fails to open.
labels: ["bug", "dashboard"]
body:
  - type: dropdown
    id: symptom
    attributes:
      label: Symptom
      options:
        - Dashboard does not open / server won't start
        - Tab is empty (Tests, ML, Cache, Analytics, etc.)
        - Data looks wrong or stale
        - Dashboard works locally but not in CI
        - Other
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened
    validations:
      required: true

  - type: textarea
    id: serve-output
    attributes:
      label: Output of `mvn test-order:serve` (or `test-order:dashboard`)
      render: text
    validations:
      required: true

  - type: input
    id: plugin-version
    attributes:
      label: Plugin version
      placeholder: "e.g. 0.5.0"
    validations:
      required: true

  - type: input
    id: browser
    attributes:
      label: Browser (if UI issue)
      placeholder: "e.g. Chrome 125, Firefox 126"

  - type: textarea
    id: state-dir
    attributes:
      label: Contents of .test-order/ directory
      description: Run `ls -la .test-order/` and paste the output.
      render: text

  - type: textarea
    id: extra
    attributes:
      label: Anything else
      description: Screenshot welcome — drag and drop here.
