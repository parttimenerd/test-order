version: 2
updates:
  - package-ecosystem: "maven"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    groups:
      maven-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
    ignore:
      # okhttp 5.x changed to Kotlin Multiplatform; the JVM artifact is now
      # okhttp-jvm, so a plain okhttp major bump breaks compilation.
      - dependency-name: "com.squareup.okhttp3:okhttp"
        update-types: ["version-update:semver-major"]
      # jenetics 8+ requires Java 21+; CI runs on Java 17.
      - dependency-name: "io.jenetics:jenetics"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "gradle"
    directory: "/test-order-gradle-plugin"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5

  - package-ecosystem: "npm"
    directory: "/test-order-dashboard/src/main/dashboard"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      dashboard-dev-deps:
        dependency-type: "development"
    ignore:
      # Vite 7+ and plugin-vue 6+ require esbuild changes / Node 22+;
      # pin to Vite 6.x until we explicitly upgrade.
      - dependency-name: "vite"
        update-types: ["version-update:semver-major"]
      - dependency-name: "@vitejs/plugin-vue"
        update-types: ["version-update:semver-major"]
      - dependency-name: "vue-tsc"
        update-types: ["version-update:semver-major"]
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]

  - package-ecosystem: "npm"
    directory: "/website"
    schedule:
      interval: "monthly"
    open-pull-requests-limit: 5
