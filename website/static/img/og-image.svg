<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a3878"/>
      <stop offset="100%" stop-color="#2255aa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#6b9bff"/>
      <stop offset="100%" stop-color="#a4c1ff"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- decorative bars on the right -->
  <g opacity="0.18" transform="translate(820,150)">
    <rect x="0"   y="0"   width="280" height="14" rx="3" fill="#fff"/>
    <rect x="0"   y="34"  width="220" height="14" rx="3" fill="#fff"/>
    <rect x="0"   y="68"  width="260" height="14" rx="3" fill="#fff"/>
    <rect x="0"   y="102" width="180" height="14" rx="3" fill="#fff"/>
    <rect x="0"   y="136" width="240" height="14" rx="3" fill="#fff"/>
    <rect x="0"   y="170" width="200" height="14" rx="3" fill="#fff"/>
    <rect x="0"   y="204" width="160" height="14" rx="3" fill="#fff"/>
    <rect x="0"   y="238" width="290" height="14" rx="3" fill="#fff"/>
  </g>

  <!-- accent check stripe -->
  <g transform="translate(80,80)">
    <circle cx="22" cy="22" r="22" fill="url(#accent)"/>
    <path d="M12 23 l8 8 l16 -16" stroke="#1a3878" stroke-width="5" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <text x="64" y="30" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="24" font-weight="700" fill="#a4c1ff">test-order</text>
  </g>

  <!-- main slogan -->
  <g transform="translate(80,240)">
    <text font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="64" font-weight="800" fill="#fff" letter-spacing="-1">
      <tspan x="0" dy="0">Stop running tests</tspan>
      <tspan x="0" dy="76">that will never fail.</tspan>
    </text>
  </g>

  <!-- sub-headline -->
  <g transform="translate(80,460)">
    <text font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="28" font-weight="400" fill="#cfd9ff" opacity="0.95">
      <tspan x="0" dy="0">Learns which of your tests actually catch bugs —</tspan>
      <tspan x="0" dy="40">and runs those first.</tspan>
    </text>
  </g>

  <!-- bottom badge row -->
  <g transform="translate(80,580)" font-family="-apple-system, Helvetica, Arial, sans-serif" font-size="18" font-weight="600" fill="#a4c1ff">
    <text x="0" y="0">Maven</text>
    <text x="100" y="0">·</text>
    <text x="120" y="0">Gradle</text>
    <text x="220" y="0">·</text>
    <text x="240" y="0">JUnit 5 / 4</text>
    <text x="380" y="0">·</text>
    <text x="400" y="0">TestNG</text>
    <text x="500" y="0">·</text>
    <text x="520" y="0">Spring Boot</text>
  </g>
</svg>
