plugins {
    id 'java'
    id 'me.bechberger.test-order' version '0.0.1-SNAPSHOT'
}

repositories {
    mavenCentral()
}

dependencies {
    testImplementation 'org.junit.jupiter:junit-jupiter:5.11.4'
    testRuntimeOnly 'org.junit.platform:junit-platform-launcher:1.11.4'
}

testOrder {
    mode = 'auto'
}

test {
    useJUnitPlatform()
}
