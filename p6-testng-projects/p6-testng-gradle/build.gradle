plugins {
    id 'java'
    id 'me.bechberger.test-order' version '0.1.0-SNAPSHOT'
}

group = 'com.example.p6'
version = '1.0.0'

repositories {
    mavenCentral()
    mavenLocal()
}

dependencies {
    testImplementation 'org.testng:testng:7.10.2'
}

tasks.named('test') {
    useTestNG()
}

testOrder {
    mode = 'combined'
}
