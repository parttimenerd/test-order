# GitLab CI — Three-tier pipeline with test-order
#
# Uses GitLab's sequential stages: tier-1 → tier-2 → tier-3.
# Each tier fails fast; later tiers are skipped on failure.
#
# Supports both Maven and Gradle (comment out whichever you don't use).

stages:
  - tier-1
  - tier-2
  - tier-3
  - post

variables:
  MAVEN_OPTS: "-Dmaven.repo.local=$CI_PROJECT_DIR/.m2/repository"

cache:
  key: test-order-${CI_COMMIT_REF_SLUG}
  paths:
    - .test-order/
    - .m2/repository/
    - build/

# ── Maven ────────────────────────────────────────────────────────────────────

tier-1:maven:
  stage: tier-1
  image: eclipse-temurin:17
  script:
    - mvn test-order:tiered-select test
        -Dtestorder.changeMode=since-last-commit
        -Dtestorder.tiered.tier2Fraction=0.5
        -Dsurefire.failIfNoSpecifiedTests=false
  artifacts:
    paths:
      - target/test-order-tier*.txt
    expire_in: 1 hour

tier-2:maven:
  stage: tier-2
  image: eclipse-temurin:17
  needs: [tier-1:maven]
  script:
    - mvn test-order:run-tier test
        -Dtestorder.tiered.currentTier=2
        -Dsurefire.failIfNoSpecifiedTests=false

tier-3:maven:
  stage: tier-3
  image: eclipse-temurin:17
  needs: [tier-2:maven]
  script:
    - mvn test-order:run-tier test
        -Dtestorder.tiered.currentTier=3
        -Dsurefire.failIfNoSpecifiedTests=false

aggregate:maven:
  stage: post
  image: eclipse-temurin:17
  when: always
  script:
    - mvn test-order:aggregate

