# Phase 1: clean install — builds the dep index AND installs artifacts to local repo
# (install is needed so the library jar is available for the phase 2 -pl consumer run)
invoker.goals = clean install

# Phase 2: select run — simulates Calculator (library) being changed.
# -am (also-make) ensures the library artifact is available.
# Profile 'select' overrides consumer's prepare execution with the affected goal.
# changeMode=explicit + changedClasses bypasses git; topN/randomM set in profile.
invoker.goals.2 = verify -Pselect -pl consumer -am -Dtestorder.changeMode=explicit -Dtestorder.changedClasses=me.bechberger.it.csm.Calculator
